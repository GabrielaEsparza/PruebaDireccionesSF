<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Dirección</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/CSS/styles.css">
</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100">

<div class="card shadow p-4" style="width: 100%; max-width: 600px;">

    <h5 class="mb-4 border-bottom pb-2">Dirección</h5>

    <div class="mb-3">
        <label for="cp" class="form-label">Código Postal</label>
        <input type="text" class="form-control" id="cp" maxlength="5" placeholder="Ej: 45030">
    </div>

    <div class="row mb-3">
        <div class="col">
            <label for="estado" class="form-label">Estado</label>
            <select class="form-select" id="estado">
                <option value="">Seleccione...</option>
            </select>
        </div>
        <div class="col">
            <label for="municipio" class="form-label">Municipio</label>
            <select class="form-select" id="municipio" disabled>
                <option value="">Seleccione el estado</option>
            </select>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col">
            <label for="localidad" class="form-label">Localidad</label>
            <select class="form-select" id="localidad" disabled>
                <option value="">Seleccione el estado</option>
            </select>
        </div>
        <div class="col">
            <label for="colonia" class="form-label">Colonia</label>
            <select class="form-select" id="colonia" disabled>
                <option value="">Ingrese el CP</option>
            </select>
            <input type="text" class="form-control mt-1" id="colonia-manual"
                   placeholder="Escribe tu colonia" style="display:none;">
        </div>
    </div>

    <div class="mb-3">
        <label for="calle" class="form-label">Calle y número</label>
        <input type="text" class="form-control" id="calle" placeholder="Ej: Av. Juárez 123">
        <small class="text-muted">Incluye el número exterior. Ej: Av. Juárez 123</small>
    </div>

    <button class="btn btn-primary w-100" onclick="continuar()">Continuar</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/JS/script.js"></script>
</body>
</html>
